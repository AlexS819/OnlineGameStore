# =======================================================================
# DATASOURCE CONFIGURATION
# =======================================================================

# Main Data Source Settings (Uses ~ tilde pointing to user home folder to guarantee write access after installation)
spring.datasource.url=jdbc:h2:file:~/.gamestore/db/gamestore_data;MODE=MySQL;NON_KEYWORDS=KEY,VALUE;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Optional External Database Settings
# spring.datasource.url=jdbc:mysql://localhost:3306/online_game_store?serverTimezone=UTC&useSSL=false
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 Web Console for administrative access
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =======================================================================
# PERSISTENCE & JPA SETTINGS
# =======================================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =======================================================================
# DATABASE MIGRATIONS (FLYWAY)
# =======================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=false

# =======================================================================
# LOGGING (Writes safely to user home)
# =======================================================================
logging.file.name=${user.home}/.gamestore/logs/app.log
logging.level.root=INFO
logging.level.com.sochka.onlinegamestore=DEBUG

# =======================================================================
# SMTP MAIL CONFIGURATION
# =======================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

